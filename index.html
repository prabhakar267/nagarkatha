<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagarkatha — Cities in Indian Language Books</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="map"></div>
    
    <div class="stats-panel">
        <h2>📚 Nagarkatha</h2>
        <div class="stat"><span>Cities</span><span id="stat-cities">—</span></div>
        <div class="stat"><span>Books</span><span id="stat-books">—</span></div>
        <div class="stat"><span>Languages</span><span id="stat-langs">—</span></div>
    </div>

    <div class="preview-panel" id="preview">
        <button class="close-btn" onclick="closePreview()">×</button>
        <div id="preview-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
